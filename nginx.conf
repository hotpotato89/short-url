events {
    worker_connections 1024;
}

http {
    server_tokens off;
    include /etc/nginx/mime.types;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    server {
        listen 80;
        server_name localhost;

        location /ui {
            alias /usr/share/nginx/html;
            try_files $uri $uri/ /ui/index.html;
        }

        location = /index.html { return 301 /ui/index.html; }
        location = /login.html { return 301 /ui/login.html; }
        location = /register.html { return 301 /ui/register.html; }
        location = /dashboard.html { return 301 /ui/dashboard.html; }
        location = /styles.css { return 301 /ui/styles.css; }
        location = /config.js { return 301 /ui/config.js; }

        location /api/ {
            proxy_pass http://api:8000/;
            proxy_set_header Host $Host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location = / {
            return 301 /ui/;
        }

        location / {
            proxy_pass http://api:8000/;
            proxy_set_header Host $Host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}