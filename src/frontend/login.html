<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Short URL</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="config.js"></script>
</head>
<body>
    <header class="header">
        <div class="logo">🔗 ShortURL</div>
        <nav class="nav">
            <a href="/">Главная</a>
            <a href="/login.html">Войти</a>
            <a href="/register.html">Регистрация</a>
        </nav>
    </header>

    <div class="container">
        <div class="form-box">
            <h2>🔐 Вход</h2>
            <div id="alert" class="alert"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;">Войти</button>
            </form>
            <p style="text-align:center;margin-top:1rem;color:#888;">
                Нет аккаунта? <a href="/register.html">Зарегистрироваться</a>
            </p>
        </div>
    </div>

    <script type="module">
        import { API_URL } from './config.js';

        const form = document.getElementById('loginForm');
        const alert = document.getElementById('alert');

        function showAlert(message, type = 'error') {
            alert.textContent = message;
            alert.className = `alert alert-${type}`;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const resp = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await resp.json();

                if (resp.ok) {
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('refresh_token', data.refresh_token);
                    window.location.href = '/dashboard.html';
                } else {
                    showAlert(data.detail || 'Ошибка входа');
                }
            } catch (e) {
                showAlert('Ошибка подключения к серверу');
            }
        });

        if (localStorage.getItem('access_token')) {
            window.location.href = '/dashboard.html';
        }
    </script>
</body>
</html>
