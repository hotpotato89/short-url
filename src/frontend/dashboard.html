<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои ссылки — Short URL</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="config.js"></script>
</head>
<body>

<header class="header" id="header"></header>

<main class="container">
    <!-- Приветствие -->
    <div class="hero">
        <h1>👋 Мои ссылки</h1>
        <p id="userInfo">Управляйте своими короткими ссылками</p>
        <span id="userEmail" class="stat-card" style="display:inline-block;padding:0.5rem 1.5rem;border-radius:2rem;background:#1a1a3a;border-color:#2a2a4e;">
            👤 Загрузка...
        </span>
    </div>

    <!-- Статистика -->
    <div class="stats">
        <div class="stat-card">
            <div class="number" id="totalUrls">0</div>
            <div class="label">Всего ссылок</div>
        </div>
        <div class="stat-card">
            <div class="number" id="totalClicks">0</div>
            <div class="label">Всего переходов</div>
        </div>
        <div class="stat-card">
            <div class="number" id="avgClicks">0</div>
            <div class="label">Среднее</div>
        </div>
    </div>

    <!-- Создание -->
    <div class="card" style="margin-bottom:2rem;">
        <div style="display:flex;align-items:center;gap:0.6rem;margin-bottom:0.8rem;font-weight:600;color:#c0c0d8;">
            <span style="font-size:1.2rem;">✨</span>
            <span>Создать ссылку</span>
        </div>
        <form id="createForm" style="display:flex;gap:0.8rem;flex-wrap:wrap;">
            <input
                type="url"
                id="originalUrl"
                placeholder="Вставьте длинную ссылку..."
                required
                style="flex:1;min-width:200px;padding:0.75rem 1rem;border-radius:0.6rem;border:1px solid #2a2a4e;background:#0e0e20;color:#e8e8f0;font-size:1rem;transition:border-color 0.3s,box-shadow 0.3s;"
            >
            <button type="submit" class="btn btn-primary" id="createBtn">Создать</button>
        </form>
    </div>

    <!-- Список -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;color:#9a9ab0;font-weight:500;border-bottom:1px solid #1a1a3a;padding-bottom:0.6rem;">
        <span>📋 Все ссылки</span>
        <span id="listCount" style="background:#1a1a3a;padding:0.15rem 0.7rem;border-radius:1rem;font-size:0.8rem;color:#7a7a92;">0</span>
    </div>

    <div id="urlsList"></div>
    <div id="emptyState" class="empty-state">
        <p style="font-size:3rem;margin-bottom:0.5rem;">📭</p>
        <p>У вас пока нет ссылок</p>
        <span style="color:#5a5a72;font-size:0.9rem;">Создайте первую ссылку выше</span>
    </div>
</main>

<!-- Модалка редактирования -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <h2>✏️ Изменить ссылку</h2>
        <form id="editForm">
            <div class="form-group">
                <label>Текущий адрес</label>
                <input type="text" id="editOldSlug" disabled>
                <small style="display:block;margin-top:0.2rem;color:#5a5a72;font-size:0.75rem;">Этот адрес уже используется</small>
            </div>
            <div class="form-group">
                <label>Новый адрес</label>
                <input
                    type="text"
                    id="editNewSlug"
                    placeholder="например: my-cool-link"
                    pattern="[a-zA-Z0-9-]+"
                    minlength="3"
                    maxlength="20"
                    required
                >
                <small style="display:block;margin-top:0.2rem;color:#5a5a72;font-size:0.75rem;">Только буквы, цифры и дефис. 3–20 символов.</small>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" id="editCancel">Отмена</button>
                <button type="submit" class="btn btn-primary" id="editSaveBtn">Сохранить</button>
            </div>
        </form>
    </div>
</div>

<script type="module">
    import { API_URL, BASE_URL } from './config.js';

    // === Проверка авторизации ===
    const token = localStorage.getItem('access_token');
    if (!token) {
        window.location.href = '/ui/auth.html';
    }

    // === DOM ===
    const $ = (sel) => document.querySelector(sel);
    const urlsList = document.getElementById('urlsList');
    const emptyState = document.getElementById('emptyState');
    const createForm = document.getElementById('createForm');
    const originalUrlInput = document.getElementById('originalUrl');
    const createBtn = document.getElementById('createBtn');
    const totalUrlsEl = document.getElementById('totalUrls');
    const totalClicksEl = document.getElementById('totalClicks');
    const avgClicksEl = document.getElementById('avgClicks');
    const listCountEl = document.getElementById('listCount');
    const userEmail = document.getElementById('userEmail');
    const editModal = document.getElementById('editModal');
    const editForm = document.getElementById('editForm');
    const editOldSlug = document.getElementById('editOldSlug');
    const editNewSlug = document.getElementById('editNewSlug');
    const editSaveBtn = document.getElementById('editSaveBtn');

    let editingSlug = null;

    // === Toast ===
    function showToast(msg, type = 'success') {
        const old = document.querySelector('.toast');
        if (old) old.remove();
        const t = document.createElement('div');
        t.className = `toast toast-${type}`;
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    // === Хедер ===
    document.getElementById('header').innerHTML = `
        <div class="logo">🔗 <span class="gradient">Short</span><span class="dim">URL</span></div>
        <nav class="nav">
            <a href="/ui/">Главная</a>
            <a href="/ui/dashboard.html" class="active">Мои ссылки</a>
            <button id="logoutBtn" class="btn btn-danger btn-sm">Выйти</button>
        </nav>
    `;

    document.getElementById('logoutBtn')?.addEventListener('click', () => {
        localStorage.removeItem('access_token');
        localStorage.removeItem('refresh_token');
        window.location.href = '/ui/';
    });

    // === Fetch с обновлением токена ===
    async function fetchWithAuth(url, opts = {}) {
        let currentToken = localStorage.getItem('access_token');
        const makeReq = (t) => fetch(url, {
            ...opts,
            headers: { ...opts.headers, 'Authorization': `Bearer ${t}` }
        });
        let resp = await makeReq(currentToken);
        if (resp.status === 401) {
            const refreshToken = localStorage.getItem('refresh_token');
            if (refreshToken) {
                try {
                    const r = await fetch(`${API_URL}/auth/refresh`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ refresh_token: refreshToken })
                    });
                    if (r.ok) {
                        const d = await r.json();
                        localStorage.setItem('access_token', d.access_token);
                        if (d.refresh_token) localStorage.setItem('refresh_token', d.refresh_token);
                        resp = await makeReq(localStorage.getItem('access_token'));
                    } else {
                        throw new Error('Refresh failed');
                    }
                } catch {
                    localStorage.removeItem('access_token');
                    localStorage.removeItem('refresh_token');
                    window.location.href = '/ui/auth.html';
                    return null;
                }
            } else {
                window.location.href = '/ui/auth.html';
                return null;
            }
        }
        return resp;
    }

    // === Загрузка пользователя ===
    async function loadUser() {
        try {
            const resp = await fetchWithAuth(`${API_URL}/auth/me`);
            if (resp?.ok) {
                const data = await resp.json();
                userEmail.textContent = `👤 ${data.email}`;
            } else {
                userEmail.textContent = '👤 Ошибка';
            }
        } catch {
            userEmail.textContent = '👤 Ошибка';
        }
    }

    // === Загрузка ссылок ===
    async function loadUrls() {
        try {
            const resp = await fetchWithAuth(`${API_URL}/url/my`);
            if (resp?.ok) {
                const urls = await resp.json();
                renderUrls(urls);
                updateStats(urls);
            } else {
                showToast('Не удалось загрузить ссылки', 'error');
            }
        } catch {
            showToast('Ошибка соединения', 'error');
        }
    }

    function updateStats(urls) {
        const total = urls.length;
        totalUrlsEl.textContent = total;
        const totalClicks = urls.reduce((s, u) => s + u.clicks, 0);
        totalClicksEl.textContent = totalClicks;
        avgClicksEl.textContent = total ? (totalClicks / total).toFixed(0) : '0';
        listCountEl.textContent = total;
    }

    function renderUrls(urls) {
        if (urls.length === 0) {
            urlsList.innerHTML = '';
            emptyState.style.display = 'block';
            return;
        }
        emptyState.style.display = 'none';

        const base = BASE_URL;

        urlsList.innerHTML = urls.map((u) => `
            <div class="url-item">
                <div class="info">
                    <div class="short" style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;">
                        <span>🔗 ${base}/url/${u.slug}</span>
                        <button 
                            class="btn btn-sm" 
                            style="background:transparent;border:1px solid #4a4a6e;color:#7c6aff;padding:0.1rem 0.5rem;font-size:0.7rem;border-radius:0.3rem;cursor:pointer;transition:all 0.2s;"
                            onclick="copyUrl('${base}/url/${u.slug}')"
                            title="Копировать ссылку"
                        >
                            📋 Копировать
                        </button>
                    </div>
                    <div class="original">${u.original_url}</div>
                    <div style="display:flex;gap:0.8rem;flex-wrap:wrap;margin-top:0.2rem;font-size:0.8rem;color:#5a5a72;">
                        <span class="clicks">👆 ${u.clicks}</span>
                        <span>📅 ${new Date(u.created_at).toLocaleDateString()}</span>
                    </div>
                </div>
                <div class="actions">
                    <button class="btn btn-edit btn-sm" onclick="editSlug('${u.slug}')">✏️</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteUrl('${u.slug}')">🗑</button>
                </div>
            </div>
        `).join('');
    }

    // === Глобальные функции ===
    window.copyUrl = (url) => {
        navigator.clipboard.writeText(url).then(() => {
            showToast('📋 Ссылка скопирована!');
        }).catch(() => {
            // fallback
            const input = document.createElement('input');
            input.value = url;
            document.body.appendChild(input);
            input.select();
            document.execCommand('copy');
            document.body.removeChild(input);
            showToast('📋 Ссылка скопирована!');
        });
    };

    window.editSlug = (slug) => {
        editingSlug = slug;
        editOldSlug.value = slug;
        editNewSlug.value = '';
        editModal.classList.add('active');
        setTimeout(() => editNewSlug.focus(), 150);
    };

    window.deleteUrl = async (slug) => {
        if (!confirm('🗑 Удалить ссылку?')) return;
        try {
            const resp = await fetchWithAuth(`${API_URL}/url/${slug}`, { method: 'DELETE' });
            if (resp?.ok) {
                showToast('🗑 Ссылка удалена');
                loadUrls();
            } else {
                showToast('Ошибка удаления', 'error');
            }
        } catch {
            showToast('Ошибка соединения', 'error');
        }
    };

    // === Создание ===
    createForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const url = originalUrlInput.value.trim();
        if (!url) return;

        createBtn.classList.add('is-loading');
        createBtn.textContent = '⏳ Создание...';
        createBtn.disabled = true;

        try {
            const resp = await fetchWithAuth(`${API_URL}/url`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ original_url: url })
            });
            if (resp?.ok) {
                showToast('✅ Ссылка создана!');
                originalUrlInput.value = '';
                loadUrls();
            } else {
                const data = resp ? await resp.json() : {};
                showToast(data.detail || 'Ошибка создания', 'error');
            }
        } catch {
            showToast('Ошибка соединения', 'error');
        } finally {
            createBtn.classList.remove('is-loading');
            createBtn.textContent = 'Создать';
            createBtn.disabled = false;
        }
    });

    // === Редактирование ===
    editForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const newSlug = editNewSlug.value.trim();
        if (!newSlug) return;

        if (newSlug === editingSlug) {
            showToast('Новый адрес совпадает с текущим', 'error');
            return;
        }

        editSaveBtn.classList.add('is-loading');
        editSaveBtn.textContent = '⏳ Сохранение...';
        editSaveBtn.disabled = true;

        try {
            const resp = await fetchWithAuth(`${API_URL}/url/${editingSlug}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ slug: newSlug })
            });
            if (resp?.ok) {
                showToast('✅ Адрес обновлён!');
                editModal.classList.remove('active');
                loadUrls();
            } else {
                const data = resp ? await resp.json() : {};
                showToast(data.detail || 'Ошибка обновления', 'error');
            }
        } catch {
            showToast('Ошибка соединения', 'error');
        } finally {
            editSaveBtn.classList.remove('is-loading');
            editSaveBtn.textContent = 'Сохранить';
            editSaveBtn.disabled = false;
        }
    });

    // === Закрытие модалки ===
    document.getElementById('editCancel').addEventListener('click', () => {
        editModal.classList.remove('active');
    });

    document.getElementById('editModalClose')?.addEventListener('click', () => {
        editModal.classList.remove('active');
    });

    editModal.addEventListener('click', (e) => {
        if (e.target === editModal) editModal.classList.remove('active');
    });

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && editModal.classList.contains('active')) {
            editModal.classList.remove('active');
        }
    });

    // === Запуск ===
    loadUser();
    loadUrls();
</script>

</body>
</html>
