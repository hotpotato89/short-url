<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель — Short URL</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="config.js"></script>
</head>
<body>
    <header class="header" id="header"></header>

    <div class="dashboard">
        <div class="dashboard-container">

            <!-- Приветствие -->
            <div class="greeting">
                <div>
                    <h1>👋 Мои ссылки</h1>
                    <p id="userInfo">Управляйте своими короткими ссылками</p>
                </div>
                <span id="userEmail" class="user-badge">👤 Загрузка...</span>
            </div>

            <!-- Статистика -->
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-number" id="totalUrls">0</div>
                    <div class="stat-label">Всего ссылок</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="totalClicks">0</div>
                    <div class="stat-label">Всего переходов</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="avgClicks">0</div>
                    <div class="stat-label">Среднее</div>
                </div>
            </div>

            <!-- Создание -->
            <div class="create-section">
                <div class="create-card">
                    <div class="create-card-header">
                        <span class="create-icon">✨</span>
                        <span>Создать ссылку</span>
                    </div>
                    <form id="createForm" class="create-form">
                        <input type="url" id="originalUrl" placeholder="Вставьте длинную ссылку..." required>
                        <button type="submit" class="btn-primary">Создать</button>
                    </form>
                </div>
            </div>

            <!-- Список ссылок -->
            <div class="list-header">
                <span>📋 Все ссылки</span>
                <span id="listCount">0</span>
            </div>

            <div id="urlsList" class="urls-list"></div>
            <div id="emptyState" class="empty-state">
                <div class="empty-icon">📭</div>
                <p>У вас пока нет ссылок</p>
                <span>Создайте первую ссылку выше</span>
            </div>

        </div>
    </div>

    <!-- Модалка редактирования -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>✏️ Изменить ссылку</h2>
                <button class="modal-close" id="editModalClose">&times;</button>
            </div>
            <form id="editForm">
                <div class="form-group">
                    <label>Текущий адрес</label>
                    <input type="text" id="editOldSlug" disabled>
                    <small>Этот адрес уже используется</small>
                </div>
                <div class="form-group">
                    <label>Новый адрес</label>
                    <input type="text" id="editNewSlug" placeholder="например: my-cool-link" pattern="[a-zA-Z0-9-]+" minlength="3" maxlength="20">
                    <small>Только буквы, цифры и дефис. 3–20 символов.</small>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="editCancel">Отмена</button>
                    <button type="submit" class="btn-primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <style>
        /* === Dashboard === */
        .dashboard {
            background: #0b0b1a;
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }

        .dashboard-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* === Greeting === */
        .greeting {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            gap: 0.8rem;
        }

        .greeting h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #e8e8f0;
            margin-bottom: 0.2rem;
        }

        .greeting p {
            color: #7a7a92;
            font-size: 0.95rem;
            margin: 0;
        }

        .user-badge {
            background: #1a1a3a;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.9rem;
            color: #b0b0cc;
            border: 1px solid #2a2a4e;
        }

        /* === Stats === */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-item {
            background: #13132a;
            padding: 1.2rem 1.5rem;
            border-radius: 1rem;
            border: 1px solid #2a2a4e;
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #7c6aff;
        }

        .stat-label {
            color: #7a7a92;
            font-size: 0.85rem;
            margin-top: 0.2rem;
        }

        /* === Create === */
        .create-section {
            margin-bottom: 2rem;
        }

        .create-card {
            background: #13132a;
            border-radius: 1rem;
            padding: 1.2rem 1.5rem;
            border: 1px solid #2a2a4e;
        }

        .create-card-header {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-weight: 600;
            color: #c0c0d8;
            margin-bottom: 0.8rem;
        }

        .create-icon {
            font-size: 1.2rem;
        }

        .create-form {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .create-form input {
            flex: 1;
            min-width: 200px;
            padding: 0.75rem 1rem;
            border-radius: 0.6rem;
            border: 1px solid #2a2a4e;
            background: #0e0e20;
            color: #e8e8f0;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .create-form input:focus {
            outline: none;
            border-color: #7c6aff;
            box-shadow: 0 0 0 3px rgba(124, 106, 255, 0.12);
        }

        .create-form input::placeholder {
            color: #5a5a72;
        }

        .create-form .btn-primary {
            padding: 0.75rem 1.8rem;
            white-space: nowrap;
        }

        /* === List === */
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            color: #9a9ab0;
            font-weight: 500;
            font-size: 0.95rem;
            border-bottom: 1px solid #1a1a3a;
            padding-bottom: 0.6rem;
        }

        .list-header span:last-child {
            background: #1a1a3a;
            padding: 0.15rem 0.7rem;
            border-radius: 1rem;
            font-size: 0.8rem;
            color: #7a7a92;
        }

        .urls-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        /* === URL Item === */
        .url-item {
            background: #13132a;
            border-radius: 0.8rem;
            padding: 0.9rem 1.2rem;
            border: 1px solid #222244;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.6rem;
            transition: border-color 0.2s;
        }

        .url-item:hover {
            border-color: #3a3a5e;
        }

        .url-item .info {
            flex: 2;
            min-width: 180px;
        }

        .url-item .short {
            font-weight: 600;
            color: #7c6aff;
            font-size: 1rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }

        .url-item .short:hover {
            color: #9a8aff;
        }

        .url-item .original {
            color: #8a8aa2;
            font-size: 0.85rem;
            word-break: break-all;
            margin-top: 0.1rem;
        }

        .url-item .meta {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 0.2rem;
            font-size: 0.8rem;
            color: #5a5a72;
        }

        .url-item .clicks {
            color: #4ade80;
        }

        .url-item .actions {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
        }

        .url-item .actions .btn-sm {
            padding: 0.25rem 0.7rem;
            font-size: 0.8rem;
            border-radius: 0.4rem;
        }

        /* === Empty State === */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            background: #0f0f22;
            border-radius: 1rem;
            border: 1px dashed #2a2a4e;
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            color: #9a9ab0;
            font-size: 1.1rem;
            margin: 0.2rem 0;
        }

        .empty-state span {
            color: #5a5a72;
            font-size: 0.9rem;
        }

        /* === Modal === */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 999;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #13132a;
            border-radius: 1.2rem;
            padding: 1.8rem;
            max-width: 420px;
            width: 90%;
            border: 1px solid #2a2a4e;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
        }

        .modal-header h2 {
            font-size: 1.3rem;
            margin: 0;
        }

        .modal-close {
            background: none;
            border: none;
            color: #7a7a92;
            font-size: 1.8rem;
            cursor: pointer;
            line-height: 1;
        }

        .modal-close:hover {
            color: #fff;
        }

        .modal-actions {
            display: flex;
            gap: 0.8rem;
            justify-content: flex-end;
            margin-top: 0.5rem;
        }

        .modal-actions .btn-secondary {
            background: transparent;
            color: #7a7a92;
            border: 1px solid #2a2a4e;
            padding: 0.5rem 1.2rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .modal-actions .btn-secondary:hover {
            background: #1a1a3a;
            color: #fff;
        }

        .modal-actions .btn-primary {
            padding: 0.5rem 1.2rem;
            border-radius: 0.5rem;
        }

        .modal .form-group {
            margin-bottom: 1rem;
        }

        .modal .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #aaaac2;
            margin-bottom: 0.2rem;
        }

        .modal .form-group input {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border-radius: 0.5rem;
            border: 1px solid #2a2a4e;
            background: #0e0e20;
            color: #e8e8f0;
            font-size: 0.95rem;
        }

        .modal .form-group input:focus {
            outline: none;
            border-color: #7c6aff;
        }

        .modal .form-group input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .modal .form-group small {
            display: block;
            margin-top: 0.2rem;
            color: #5a5a72;
            font-size: 0.75rem;
        }

        /* === Responsive === */
        @media (max-width: 768px) {
            .dashboard {
                padding: 1rem;
            }

            .greeting h1 {
                font-size: 1.5rem;
            }

            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }

            .stat-item:last-child {
                grid-column: span 2;
            }

            .create-form {
                flex-direction: column;
            }

            .create-form .btn-primary {
                width: 100%;
                justify-content: center;
            }

            .url-item {
                flex-direction: column;
                align-items: stretch;
            }

            .url-item .actions {
                justify-content: flex-start;
                margin-top: 0.4rem;
            }

            .user-badge {
                font-size: 0.8rem;
                padding: 0.2rem 0.8rem;
            }
        }
    </style>

    <script type="module">
        import { API_URL } from './config.js';

        const token = localStorage.getItem('access_token');
        if (!token) window.location.href = '/ui/auth.html';

        // === Хедер ===
        document.getElementById('header').innerHTML = `
            <div class="logo">🔗 <span class="gradient">Short</span><span class="dim">URL</span></div>
            <nav class="nav">
                <a href="/ui/">Главная</a>
                <a href="/ui/dashboard.html" class="active">Мои ссылки</a>
                <button id="logoutBtn" class="btn btn-danger btn-sm">Выйти</button>
            </nav>
        `;
        document.getElementById('logoutBtn')?.addEventListener('click', () => {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            window.location.href = '/ui/';
        });

        // === DOM ===
        const urlsList = document.getElementById('urlsList');
        const emptyState = document.getElementById('emptyState');
        const createForm = document.getElementById('createForm');
        const originalUrlInput = document.getElementById('originalUrl');
        const totalUrlsEl = document.getElementById('totalUrls');
        const totalClicksEl = document.getElementById('totalClicks');
        const avgClicksEl = document.getElementById('avgClicks');
        const listCountEl = document.getElementById('listCount');

        const editModal = document.getElementById('editModal');
        const editForm = document.getElementById('editForm');
        const editOldSlug = document.getElementById('editOldSlug');
        const editNewSlug = document.getElementById('editNewSlug');
        const userEmail = document.getElementById('userEmail');

        let editingSlug = null;

        function showToast(msg, type = 'success') {
            const t = document.createElement('div');
            t.className = `toast toast-${type}`;
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        async function fetchWithAuth(url, opts = {}) {
            let currentToken = localStorage.getItem('access_token');
            const makeReq = (t) => fetch(url, { ...opts, headers: { ...opts.headers, 'Authorization': `Bearer ${t}` } });
            let resp = await makeReq(currentToken);
            if (resp.status === 401) {
                const refreshToken = localStorage.getItem('refresh_token');
                if (refreshToken) {
                    try {
                        const r = await fetch(`${API_URL}/auth/refresh`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ refresh_token: refreshToken })
                        });
                        if (r.ok) {
                            const d = await r.json();
                            localStorage.setItem('access_token', d.access_token);
                            if (d.refresh_token) localStorage.setItem('refresh_token', d.refresh_token);
                            resp = await makeReq(localStorage.getItem('access_token'));
                        } else {
                            throw new Error('Refresh failed');
                        }
                    } catch {
                        localStorage.removeItem('access_token');
                        localStorage.removeItem('refresh_token');
                        window.location.href = '/ui/auth.html';
                        return null;
                    }
                }
            }
            return resp;
        }

        // === Загрузка пользователя ===
        async function loadUser() {
            try {
                const resp = await fetchWithAuth(`${API_URL}/auth/me`);
                if (resp && resp.ok) {
                    const data = await resp.json();
                    userEmail.textContent = `👤 ${data.email}`;
                }
            } catch {
                userEmail.textContent = '👤 Ошибка';
            }
        }

        // === Загрузка ссылок ===
        async function loadUrls() {
            const resp = await fetchWithAuth(`${API_URL}/url/my`);
            if (resp && resp.ok) {
                const urls = await resp.json();
                renderUrls(urls);
                updateStats(urls);
            }
        }

        function updateStats(urls) {
            totalUrlsEl.textContent = urls.length;
            const totalClicks = urls.reduce((s, u) => s + u.clicks, 0);
            totalClicksEl.textContent = totalClicks;
            avgClicksEl.textContent = urls.length ? (totalClicks / urls.length).toFixed(0) : '0';
            listCountEl.textContent = urls.length;
        }

        function renderUrls(urls) {
            if (urls.length === 0) {
                urlsList.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }
            emptyState.style.display = 'none';

            urlsList.innerHTML = urls.map(u => `
                <div class="url-item">
                    <div class="info">
                        <div class="short" onclick="copyUrl('${window.location.origin}/url/${u.slug}')">
                            🔗 ${window.location.origin}/url/${u.slug}
                            <span style="font-size:0.7rem;color:#5a5a72;font-weight:400;">(копировать)</span>
                        </div>
                        <div class="original">${u.original_url}</div>
                        <div class="meta">
                            <span class="clicks">👆 ${u.clicks}</span>
                            <span>📅 ${new Date(u.created_at).toLocaleDateString()}</span>
                        </div>
                    </div>
                    <div class="actions">
                        <button class="btn btn-edit btn-sm" onclick="editSlug('${u.slug}')" title="Изменить адрес">✏️</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteUrl('${u.slug}')" title="Удалить">🗑</button>
                    </div>
                </div>
            `).join('');
        }

        window.copyUrl = (url) => {
            navigator.clipboard.writeText(url);
            showToast('📋 Ссылка скопирована!');
        };

        window.editSlug = (slug) => {
            editingSlug = slug;
            editOldSlug.value = slug;
            editNewSlug.value = '';
            editModal.classList.add('active');
            setTimeout(() => editNewSlug.focus(), 150);
        };

        window.deleteUrl = async (slug) => {
            if (!confirm('🗑 Удалить ссылку?')) return;
            const resp = await fetchWithAuth(`${API_URL}/url/${slug}`, { method: 'DELETE' });
            if (resp && resp.ok) {
                showToast('🗑 Ссылка удалена');
                loadUrls();
            } else {
                showToast('Ошибка удаления', 'error');
            }
        };

        // === Создание ===
        createForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const url = originalUrlInput.value.trim();
            if (!url) return;
            const resp = await fetchWithAuth(`${API_URL}/url`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ original_url: url })
            });
            if (resp && resp.ok) {
                showToast('✅ Ссылка создана!');
                originalUrlInput.value = '';
                loadUrls();
            } else {
                const data = resp ? await resp.json() : {};
                showToast(data.detail || 'Ошибка создания', 'error');
            }
        });

        // === Редактирование ===
        editForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newSlug = editNewSlug.value.trim();
            if (!newSlug) return;
            const resp = await fetchWithAuth(`${API_URL}/url/${editingSlug}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ slug: newSlug })
            });
            if (resp && resp.ok) {
                showToast('✅ Адрес обновлён!');
                editModal.classList.remove('active');
                loadUrls();
            } else {
                const data = resp ? await resp.json() : {};
                showToast(data.detail || 'Ошибка обновления', 'error');
            }
        });

        document.getElementById('editCancel').addEventListener('click', () => {
            editModal.classList.remove('active');
        });

        document.getElementById('editModalClose').addEventListener('click', () => {
            editModal.classList.remove('active');
        });

        editModal.addEventListener('click', (e) => {
            if (e.target === editModal) editModal.classList.remove('active');
        });

        loadUser();
        loadUrls();
    </script>
</body>
</html>
