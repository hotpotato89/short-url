<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Short URL</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="config.js"></script>
</head>
<body>
    <header class="header">
        <div class="logo">🔗 ShortURL</div>
        <nav class="nav">
            <a href="/ui/">Главная</a>
            <a href="/ui/auth.html" id="navAuth">Войти</a>
        </nav>
    </header>

    <div class="container">
        <div class="auth-box">
            <div class="auth-tabs">
                <button class="auth-tab active" data-mode="login">🔐 Вход</button>
                <button class="auth-tab" data-mode="register">📝 Регистрация</button>
            </div>

            <div id="alert" class="alert"></div>

            <!-- Форма входа -->
            <form id="loginForm" class="auth-form active">
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Пароль</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;">Войти</button>
            </form>

            <!-- Форма регистрации -->
            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="regEmail">Email</label>
                    <input type="email" id="regEmail" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="regPassword">Пароль</label>
                    <input type="password" id="regPassword" placeholder="••••••••" required minlength="6">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;">Зарегистрироваться</button>
            </form>
        </div>
    </div>

    <style>
        .auth-box {
            max-width: 400px;
            margin: 2rem auto;
            background: #141428;
            padding: 2rem;
            border-radius: 1rem;
            border: 1px solid #2a2a4e;
        }

        .auth-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            background: #0a0a1a;
            border-radius: 0.5rem;
            padding: 0.3rem;
        }

        .auth-tab {
            flex: 1;
            padding: 0.6rem;
            border: none;
            background: transparent;
            color: #888;
            cursor: pointer;
            border-radius: 0.4rem;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 0.95rem;
        }

        .auth-tab.active {
            background: #6c63ff;
            color: #fff;
            box-shadow: 0 4px 15px rgba(108, 99, 255, 0.3);
        }

        .auth-tab:hover:not(.active) {
            color: #fff;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .auth-form .btn {
            margin-top: 0.5rem;
        }
    </style>

    <script type="module">
        import { API_URL } from './config.js';

        const tabs = document.querySelectorAll('.auth-tab');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const alert = document.getElementById('alert');
        const navAuth = document.getElementById('navAuth');

        function showAlert(msg, type = 'error') {
            alert.textContent = msg;
            alert.className = `alert alert-${type}`;
        }

        function switchTab(mode) {
            tabs.forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
            loginForm.classList.toggle('active', mode === 'login');
            registerForm.classList.toggle('active', mode === 'register');
            alert.className = 'alert';
            alert.textContent = '';
        }

        tabs.forEach(tab => {
            tab.addEventListener('click', () => switchTab(tab.dataset.mode));
        });

        // Логин
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const resp = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await resp.json();
                if (resp.ok) {
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('refresh_token', data.refresh_token);
                    window.location.href = '/ui/dashboard.html';
                } else {
                    showAlert(data.detail || 'Неверный email или пароль');
                }
            } catch {
                showAlert('Ошибка подключения');
            }
        });

        // Регистрация
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            try {
                const resp = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await resp.json();
                if (resp.ok) {
                    showAlert('✅ Регистрация успешна! Теперь войдите.', 'success');
                    switchTab('login');
                    document.getElementById('loginEmail').value = email;
                    document.getElementById('loginPassword').value = '';
                } else {
                    showAlert(data.detail || 'Ошибка регистрации');
                }
            } catch {
                showAlert('Ошибка подключения');
            }
        });

        // Если уже авторизован
        if (localStorage.getItem('access_token')) {
            window.location.href = '/ui/dashboard.html';
        }

        // Обновить навигацию
        const token = localStorage.getItem('access_token');
        if (token) {
            navAuth.textContent = 'Панель';
            navAuth.href = '/ui/dashboard.html';
        }
    </script>
</body>
</html>
