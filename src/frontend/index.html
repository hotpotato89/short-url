<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Short URL</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="config.js"></script>
</head>
<body>
    <header class="header" id="header"></header>

    <div class="container">
        <section class="hero">
            <h1>🔗 <span>Short</span>URL</h1>
            <p>Короткие ссылки за секунды</p>
            <a href="/ui/dashboard.html" class="btn btn-primary" id="heroBtn">Мои ссылки</a>
            <a href="/ui/auth.html" class="btn btn-secondary" id="heroAuth">Войти</a>
        </section>

        <div class="stats">
            <div class="stat-card">
                <div class="number" id="totalUrls">0</div>
                <div class="label">Всего ссылок</div>
            </div>
            <div class="stat-card">
                <div class="number" id="totalClicks">0</div>
                <div class="label">Всего переходов</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { API_URL } from './config.js';
        const token = localStorage.getItem('access_token');

        function renderHeader() {
            const header = document.getElementById('header');
            header.innerHTML = `
                <div class="logo">🔗 <span>Short</span>URL</div>
                <nav class="nav">
                    <a href="/ui/">Главная</a>
                    <a href="/ui/dashboard.html">Мои ссылки</a>
                    ${token ? `<button id="logoutBtn" class="btn btn-danger btn-sm">Выйти</button>` : `<a href="/ui/auth.html">Войти</a>`}
                </nav>
            `;
            if (token) {
                document.getElementById('logoutBtn')?.addEventListener('click', () => {
                    localStorage.removeItem('access_token');
                    localStorage.removeItem('refresh_token');
                    window.location.href = '/ui/';
                });
            }
            document.getElementById('heroBtn').textContent = token ? 'Мои ссылки' : 'Начать';
            document.getElementById('heroBtn').href = '/ui/dashboard.html';
            document.getElementById('heroAuth').style.display = token ? 'none' : 'inline-block';
        }

        async function loadStats() {
            if (!token) return;
            try {
                const resp = await fetch(`${API_URL}/url/my`, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                if (resp.ok) {
                    const urls = await resp.json();
                    document.getElementById('totalUrls').textContent = urls.length;
                    const clicks = urls.reduce((s, u) => s + u.clicks, 0);
                    document.getElementById('totalClicks').textContent = clicks;
                }
            } catch {}
        }

        renderHeader();
        loadStats();
    </script>
</body>
</html>
