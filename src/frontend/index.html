<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Short URL</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="config.js"></script>
</head>
<body>
    <header class="header">
        <div class="logo">🔗 ShortURL</div>
        <nav class="nav">
            <a href="/">Главная</a>
            <a href="/dashboard.html">Мои ссылки</a>
            <a href="/login.html" id="authLink">Войти</a>
            <a href="/dashboard.html" id="dashboardLink" style="display:none;">Панель</a>
            <button id="logoutBtn" class="btn btn-danger btn-sm" style="display:none;">Выйти</button>
        </nav>
    </header>

    <div class="container">
        <section class="hero">
            <h1>🔗 Короткие ссылки</h1>
            <p>Создавайте короткие, красивые и запоминающиеся ссылки за секунды.</p>
            <a href="/dashboard.html" class="btn btn-primary" id="heroBtn">Начать</a>
            <a href="/login.html" class="btn btn-secondary" id="heroAuthBtn">Войти</a>
        </section>

        <div class="stats">
            <div class="stat-card">
                <div class="number" id="totalUrls">0</div>
                <div class="label">Всего ссылок</div>
            </div>
            <div class="stat-card">
                <div class="number" id="totalClicks">0</div>
                <div class="label">Всего переходов</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { API_URL } from './config.js';

        const token = localStorage.getItem('access_token');
        const authLink = document.getElementById('authLink');
        const dashboardLink = document.getElementById('dashboardLink');
        const logoutBtn = document.getElementById('logoutBtn');
        const heroBtn = document.getElementById('heroBtn');
        const heroAuthBtn = document.getElementById('heroAuthBtn');

        function updateNav() {
            if (token) {
                authLink.style.display = 'none';
                dashboardLink.style.display = 'inline';
                logoutBtn.style.display = 'inline';
                heroBtn.textContent = 'Мои ссылки';
                heroBtn.href = '/dashboard.html';
                heroAuthBtn.style.display = 'none';
            } else {
                authLink.style.display = 'inline';
                dashboardLink.style.display = 'none';
                logoutBtn.style.display = 'none';
                heroBtn.textContent = 'Начать';
                heroBtn.href = '/dashboard.html';
                heroAuthBtn.style.display = 'inline';
            }
        }

        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            window.location.href = '/';
        });

        async function loadStats() {
            if (!token) return;
            try {
                const resp = await fetch(`${API_URL}/url/my`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (resp.ok) {
                    const urls = await resp.json();
                    document.getElementById('totalUrls').textContent = urls.length;
                    const clicks = urls.reduce((sum, u) => sum + u.clicks, 0);
                    document.getElementById('totalClicks').textContent = clicks;
                }
            } catch (e) {
                console.error('Stats error:', e);
            }
        }

        updateNav();
        loadStats();
    </script>
</body>
</html>
