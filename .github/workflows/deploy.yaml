name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with: 
          python-version: '3.14'

      - name: Install dependencies
        run: |
          pip install uv
          uv sync --frozen

      - name: Install pytest-cov
        run: |
          uv add --dev pytest-cov

      - name: Generate RSA keys
        run: |
          mkdir -p keys
          openssl genrsa -out keys/private.pem 2048
          openssl rsa -in keys/private.pem -pubout -out keys/public.pem

      - name: Run tests with coverage
        run: |
          uv run pytest --cov=src.app --cov-report=html --cov-report=term --cov-fail-under=80
        env:
          # PostgreSQL
          DB__NAME: shorturl
          DB__USER: postgres
          DB__PASSWORD: postgres
          DB__HOST: localhost
          DB__PORT: 5432

          # Redis
          REDIS__HOST: localhost
          REDIS__PORT: 6379
          REDIS__DB: 0
          REDIS__RATE_LIMITER_DB: 1
          REDIS__CELERY_DB: 2

          # JWT (RSA)
          JWT__PRIVATE_KEY_PATH: keys/private.pem
          JWT__PUBLIC_KEY_PATH: keys/public.pem

          # App
          APP__ENV: dev
          APP__CORS_ORIGINS: '["http://localhost:3000"]'
          APP__BASE_URL: http://localhost:8000
          APP__LOG_LEVEL: INFO

          # Argon2
          ARGON2__TIME_COST: 1
          ARGON2__MEMORY_COST: 8192
          ARGON2__PARALLELISM: 1
          ARGON2__HASH_LEN: 16
          ARGON2__SALT_LEN: 16

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:    
      - name: Deploy to Render
        if: success()
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}