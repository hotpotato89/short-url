name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with: 
          python-version: 3.14

      - name: Install deps
        run: |
          pip install uv
          uv sync --frozen

      - name: Run tests
        run: |
          uv run pytest
        
      - name: Deploy Render
        if: success()
        run: |
          curl -X POST ${{secrets.RENDER_DEPLOY_HOOK}}